{% extends "base.html" %}

{% block content %}
<div class="auth-container fade-in">
    <div class="auth-card glass">
        <h2>Join CLH</h2>
        <p>Start mapping your way to mastery.</p>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="JohnDoe" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    </div>
</div>

<style>
    /* Reuses login styles since they're basic */
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
    }

    .auth-card {
        padding: 2.5rem;
        width: 100%;
        max-width: 450px;
        box-shadow: var(--card-shadow);
        text-align: center;
    }

    .auth-card h2 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }

    .auth-card p {
        color: var(--text-dim);
        margin-bottom: 2rem;
    }

    .form-group {
        text-align: left;
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-main);
    }

    .form-group input {
        width: 100%;
        padding: 1rem;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        outline: none;
        transition: border 0.3s;
    }

    .form-group input:focus {
        border-color: var(--accent-color);
    }

    .btn-full {
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
        margin-top: 1rem;
    }

    .auth-footer {
        margin-top: 1.5rem;
        font-size: 0.9rem;
    }

    .auth-footer a {
        color: var(--accent-color);
        text-decoration: none;
    }
</style>
{% endblock %}
