{% extends "base.html" %}

{% block content %}
<div class="study-container fade-in">
    <div class="study-card glass">
        <div class="study-header">
            <a href="{{ url_for('dashboard') }}" class="back-btn"><i class="fas fa-arrow-left"></i> Back to
                Dashboard</a>
            <h1><i class="fas fa-lightbulb"></i> {{ topic.name }}</h1>
            <span class="badge" style="background: {{ topic.color }}88;">{{ topic.subject }}</span>
        </div>

        <div class="study-content">
            <div class="points-section">
                <h2><i class="fas fa-bolt"></i> AI Golden Points</h2>
                <div class="ai-response glass">
                    {% if summary %}
                    {{ summary|safe }}
                    {% else %}
                    <p>Loading AI insights...</p>
                    {% endif %}
                </div>
            </div>

            <div class="details-section">
                <h3>Original Content</h3>
                <p>{{ topic.content }}</p>

                <div class="study-actions">
                    <form action="{{ url_for('review_topic', topic_id=topic._id) }}" method="POST">
                        <label>Update Confidence:</label>
                        <div class="confidence-selector">
                            <input type="range" name="confidence" min="1" max="5" value="{{ topic.confidence_score }}"
                                step="1" id="study-conf-slider">
                            <span id="study-conf-val">{{ topic.confidence_score }}</span>
                        </div>
                        <button type="submit" class="btn btn-primary">Mark as Reviewed</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .study-container {
        display: flex;
        justify-content: center;
        padding-top: 2rem;
    }

    .study-card {
        width: 100%;
        max-width: 900px;
        padding: 3rem;
        min-height: 80vh;
    }

    .study-header {
        margin-bottom: 2.5rem;
    }

    .back-btn {
        color: var(--accent-color);
        text-decoration: none;
        display: inline-block;
        margin-bottom: 1.5rem;
        font-weight: 600;
    }

    .study-header h1 {
        font-size: 3rem;
        margin-bottom: 0.5rem;
    }

    .study-content {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2.5rem;
    }

    .ai-response {
        padding: 2rem;
        background: rgba(56, 189, 248, 0.05);
        border-radius: 12px;
        line-height: 1.8;
        font-size: 1.1rem;
        margin-top: 1rem;
    }

    .ai-response ul {
        padding-left: 1.5rem;
        margin-top: 1rem;
    }

    .ai-response li {
        margin-bottom: 0.8rem;
    }

    .details-section {
        margin-top: 2rem;
        color: var(--text-dim);
    }

    .study-actions {
        margin-top: 3rem;
        padding-top: 2rem;
        border-top: 1px solid var(--glass-border);
    }

    .confidence-selector {
        margin: 1rem 0;
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    #study-conf-val {
        font-size: 1.5rem;
        color: var(--accent-color);
        font-weight: 700;
    }
</style>

<script>
    const slider = document.getElementById('study-conf-slider');
    const val = document.getElementById('study-conf-val');
    if (slider) {
        slider.oninput = function () { val.innerHTML = this.value; }
    }
</script>
{% endblock %}
