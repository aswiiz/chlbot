services:
  - type: web
    name: cognitive-learning-hub
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
